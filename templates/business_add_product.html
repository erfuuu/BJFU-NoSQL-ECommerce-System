{% extends "business_base.html" %}

{% block title %}添加商品{% endblock %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        color: #333;
    }
    .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    label {
        font-weight: bold;
    }
    input[type="text"], input[type="url"], input[type="number"], textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
    }
    input[type="text"]:focus, input[type="url"]:focus, input[type="number"]:focus, textarea:focus {
        border-color: #3498db;
        outline: none;
    }
    textarea {
        height: 100px;
        resize: vertical;
    }
    button {
        padding: 10px 15px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #2980b9;
    }
    .messages {
        margin-top: 20px;
        list-style: none;
        padding: 0;
    }
    .messages li {
        background-color: #f7f7f7;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin-bottom: 10px;
        font-size: 14px;
    }
    .image-section {
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 5px;
        background-color: #f9f9f9;
    }
    .image-option {
        margin-bottom: 15px;
    }
    .image-option h4 {
        margin-bottom: 10px;
        color: #2c3e50;
    }
</style>

<div class="container">
    <h2>添加商品</h2>
    <form method="POST" action="{% url 'add_product' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="name">商品名称:</label>
        <input type="text" name="name" id="name" placeholder="请输入商品名称" required>

        <label for="price">价格:</label>
        <input type="number" name="price" id="price" placeholder="请输入商品价格" step="0.01" required>

        <label for="stock">库存数量:</label>
        <input type="number" name="stock" id="stock" placeholder="请输入库存数量" required>

        <label for="description">描述:</label>
        <textarea name="description" id="description" placeholder="请输入商品描述"></textarea>

        <label for="tags">标签 (用逗号分隔):</label>
        <input type="text" name="tags" id="tags" placeholder="例如: 电子, 家居">

        <div class="image-section">
            <div class="image-option">
                <h4>方式一：上传图片文件</h4>
                <input type="file" name="image_file" id="image_file" accept="image/*">
            </div>
            <div class="image-option">
                <h4>方式二：输入图片 URL</h4>
                <input type="url" name="image_url" id="image_url" placeholder="请输入商品图片的 URL">
            </div>
        </div>

        <button type="submit">提交</button>
    </form>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
{% endblock %}
