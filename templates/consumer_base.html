<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{% block title %}页面标题{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* 导航栏样式 */
        nav {
            background-color: #87CEFA; /* 设置天蓝色背景 */
            color: white;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 添加阴影效果 */
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        nav a:hover {
            background-color: #6CA6CD; /* 鼠标悬停时的蓝色加深 */
            color: #fff;
        }

        .content {
            padding: 20px;
            background-color: #fff;
        }

        /* 消息框样式 */
        .message {
            margin: 20px auto;
            padding: 10px;
            width: 80%;
            max-width: 800px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'consumer_home' %}">首页</a>
        <a href="{% url 'cart_view' %}">购物车</a>
        <a href="{% url 'order_view' %}">我的订单</a>
        {% if request.session.user_id %}
            <a href="{% url 'user_profile' %}">用户ID: {{ request.session.user_id }}</a>
        {% else %}
            <a href="{% url 'login' %}">请登录</a>
        {% endif %}
    </nav>

    <!-- 全局消息框 -->
    <div id="global-message" class="message"></div>

    <!-- 页面消息框 -->
    <div id="message-box" class="message {% if messages %}{% for message in messages %}{{ message.tags }}{% endfor %}{% endif %}" style="display: {% if messages %}block{% else %}none{% endif %};">
        {% if messages %}
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        {% endif %}
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script defer>
        window.onload = function() {
            const messageBox = document.getElementById("message-box");
            if (messageBox && messageBox.innerText.trim() !== "") {
                setTimeout(() => {
                    messageBox.style.display = "none";
                }, 3000);
            }
        };

        // 显示全局消息
        function showMessage(message, success = true) {
            const globalMessage = document.getElementById("global-message");
            globalMessage.innerText = message;
            globalMessage.classList.toggle("success", success);
            globalMessage.classList.toggle("error", !success);
            globalMessage.style.display = "block";
            setTimeout(() => {
                globalMessage.style.display = "none";
            }, 3000);
        }
    </script>

    <!-- 页面自定义脚本 -->
    {% block scripts %}{% endblock %}

    <!-- 身份验证检查脚本 - 防止多标签页登录冲突 -->
    <script>
        // 存储当前页面期望的用户类型
        const expectedUserType = 'consumer';
        const expectedUserId = '{{ request.session.user_id }}';
        
        // 定期检查身份验证状态
        function checkAuthStatus() {
            fetch('/api/check_auth/')
                .then(response => response.json())
                .then(data => {
                    if (data.authenticated) {
                        // 如果当前session是其他身份，刷新页面会触发装饰器重定向
                        if (data.user_type !== expectedUserType) {
                            console.log('检测到身份变化，即将刷新页面...');
                            alert('您的登录状态已发生变化，页面将刷新。');
                            window.location.reload();
                        }
                        // 如果用户ID发生变化，也刷新页面
                        else if (expectedUserId && data.user_id !== expectedUserId) {
                            console.log('检测到用户变化，即将刷新页面...');
                            alert('您的登录状态已发生变化，页面将刷新。');
                            window.location.reload();
                        }
                    } else if (expectedUserId) {
                        // 如果当前页面认为已登录但session已失效
                        console.log('检测到登出状态，即将刷新页面...');
                        alert('您的登录状态已发生变化，页面将刷新。');
                        window.location.reload();
                    }
                })
                .catch(error => console.error('身份验证检查失败:', error));
        }
        
        // 页面可见性变化时立即检查
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                checkAuthStatus();
            }
        });
        
        // 每30秒检查一次
        setInterval(checkAuthStatus, 30000);
        
        // 页面加载完成后立即检查一次
        document.addEventListener('DOMContentLoaded', checkAuthStatus);
    </script>
</body>
</html>
