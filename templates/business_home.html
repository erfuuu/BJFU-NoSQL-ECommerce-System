{% extends "business_base.html" %}

{% block title %}商品列表{% endblock %}

{% block content %}
<h1>商品列表</h1>
<div class="product-grid">
    {% for product in products %}
        <div class="product-item">
            <a href="{% url 'business_product_detail' product.product_id %}">
                <img src="{{ product.image_url }}" alt="{{ product.name }}">
                <h3>{{ product.name }}</h3>
            </a>
            <p>价格: ￥{{ product.price }}</p>
            <p>库存: {{ product.stock }}</p>
            <p>销量: {{ product.sales_volume }}</p>
            <p>点击量: {{ product.clicks }}</p>
        </div>
    {% endfor %}
</div>

    <style>
    .product-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 每行两个商品 */
        gap: 20px; /* 商品间距 */
    }
    .product-item {
        background-color: white;
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
    }
    .product-item img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin-bottom: 10px;
    }
    .product-item h3 {
        margin: 10px 0;
        font-size: 18px;
    }
    .product-item p {
        margin: 5px 0;
        font-size: 14px;
        color: #555;
    }
</style>
{% endblock %}
