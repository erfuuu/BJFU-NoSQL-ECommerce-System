<!-- business_profile.html -->
{% extends 'business_base.html' %}

{% block title %}个人信息{% endblock %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        color: #333;
    }
    .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    label {
        font-weight: bold;
    }
    input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
    }
    input[type="text"]:focus {
        border-color: #3498db;
        outline: none;
    }
    button {
        padding: 10px 15px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #2980b9;
    }
    .messages {
        margin-top: 20px;
        list-style: none;
        padding: 0;
    }
    .messages li {
        background-color: #f7f7f7;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin-bottom: 10px;
        font-size: 14px;
    }
</style>

<div class="container">
    <h1>个人信息</h1>
    <form method="post" action="{% url 'business_profile' %}">
        {% csrf_token %}
        <div>
            <label for="name">用户名:</label>
            <input type="text" name="name" id="name" value="{{ user_profile.name }}" required>
        </div>
        <div>
            <label for="address">地址:</label>
            <input type="text" name="address" id="address" value="{{ user_profile.address }}" required>
        </div>
        <div>
            <label for="phone">电话:</label>
            <input type="text" name="phone" id="phone" value="{{ user_profile.phone }}" required>
        </div>
        <button type="submit">更新信息</button>
    </form>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
{% endblock %}
