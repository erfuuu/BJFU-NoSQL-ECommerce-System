<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}管理员页面{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .navbar-left a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        nav .navbar-left a:hover, nav .navbar-left a.active {
            text-decoration: underline;
            color: #4CAF50;
        }
        nav .navbar-right {
            color: white;
            font-size: 14px;
        }
        .navbar-right span {
            margin-right: 15px;
        }

        .container {
            padding: 20px 30px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #45a049;
        }

        .search-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .search-bar input {
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-bar button {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .search-bar button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar-left">
            <a href="{% url 'logs_view' %}">日志管理</a>
            <a href="{% url 'comments_view' %}">评论管理</a>
            <a href="{% url 'clicks_view' %}">点击量管理</a>
            <a href="{% url 'users_view' %}">用户管理</a>
        </div>
        <div class="navbar-right">
            {% if request.session.user_id %}
                <span>身份: 管理员</span>
                <span>用户ID: {{ request.session.user_id }}</span>
            {% else %}
                <span>未登录</span>
            {% endif %}
        </div>
    </nav>
    <div>
        {% block content %}{% endblock %}
    </div>

    <!-- 身份验证检查脚本 - 防止多标签页登录冲突 -->
    <script>
        // 存储当前页面期望的用户类型
        const expectedUserType = 'manager';
        const expectedUserId = '{{ request.session.user_id }}';
        
        // 定期检查身份验证状态
        function checkAuthStatus() {
            fetch('/api/check_auth/')
                .then(response => response.json())
                .then(data => {
                    if (data.authenticated) {
                        // 如果当前session是其他身份，刷新页面会触发装饰器重定向
                        if (data.user_type !== expectedUserType) {
                            console.log('检测到身份变化，即将刷新页面...');
                            alert('您的登录状态已发生变化，页面将刷新。');
                            window.location.reload();
                        }
                        // 如果用户ID发生变化，也刷新页面
                        else if (expectedUserId && data.user_id !== expectedUserId) {
                            console.log('检测到用户变化，即将刷新页面...');
                            alert('您的登录状态已发生变化，页面将刷新。');
                            window.location.reload();
                        }
                    } else if (expectedUserId) {
                        // 如果当前页面认为已登录但session已失效
                        console.log('检测到登出状态，即将刷新页面...');
                        alert('您的登录状态已发生变化，页面将刷新。');
                        window.location.reload();
                    }
                })
                .catch(error => console.error('身份验证检查失败:', error));
        }
        
        // 页面可见性变化时立即检查
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                checkAuthStatus();
            }
        });
        
        // 每30秒检查一次
        setInterval(checkAuthStatus, 30000);
        
        // 页面加载完成后立即检查一次
        document.addEventListener('DOMContentLoaded', checkAuthStatus);
    </script>
</body>
</html>
