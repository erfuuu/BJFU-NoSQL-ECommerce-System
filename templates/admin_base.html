<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}管理员页面{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .navbar-left a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        nav .navbar-left a:hover, nav .navbar-left a.active {
            text-decoration: underline;
            color: #4CAF50;
        }
        nav .navbar-right {
            color: white;
            font-size: 14px;
        }
        .navbar-right span {
            margin-right: 15px;
        }

        .container {
            padding: 20px 30px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #45a049;
        }

        .search-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .search-bar input {
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-bar button {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .search-bar button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar-left">
            <a href="{% url 'logs_view' %}">日志管理</a>
            <a href="{% url 'comments_view' %}">评论管理</a>
            <a href="{% url 'clicks_view' %}">点击量管理</a>
            <a href="{% url 'users_view' %}">用户管理</a>
        </div>
        <div class="navbar-right">
            {% if request.session.user_id %}
                <span>身份: 管理员</span>
                <span>用户ID: {{ request.session.user_id }}</span>
                <a href="{% url 'logout' %}" style="color: white; margin-left: 15px;">退出登录</a>
            {% else %}
                <span>未登录</span>
            {% endif %}
        </div>
    </nav>
    <div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
