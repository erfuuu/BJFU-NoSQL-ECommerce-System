{% extends "admin_base.html" %}
{% block content %}
    <div class="card">
        <div class="card-header">点击量管理</div>
        <div class="search-bar">
            <form method="GET" style="display: flex; gap: 10px; align-items: center;">
                <input type="text" name="product_id" placeholder="搜索商品ID" value="{{ query }}" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex-grow: 1;">
                <button type="submit" style="padding: 10px 20px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s ease;">搜索</button>
            </form>
        </div>
        <table class="clicks-table">
            <thead>
                <tr>
                    <th>商品ID</th>
                    <th>商品名称</th>
                    <th>点击量</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                    <tr>
                        <td>{{ product.product_id }}</td>
                        <td>{{ product.name }}</td>
                        <td>{{ product.clicks }}</td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="3" style="text-align: center; color: #888;">没有找到相关商品</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- 点击量热度排行榜 -->
    <div class="card">
        <div class="card-header">点击量热度排行榜</div>
        <canvas id="clicksChart" style="width: 100%; height: 400px;"></canvas>
    </div>
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // 从后端传递的产品数据
    const products = {{ products|safe }};

    // 提取商品名称和点击量
    const labels = products.map(product => product.name);
    const data = products.map(product => product.clicks);

    // 初始化 Chart.js
    const ctx = document.getElementById('clicksChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels, // 动态商品名称
            datasets: [{
                label: '点击量',
                data: data, // 动态点击量
                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: '点击量'
                    }
                }
            }
        }
    });
</script>
{% endblock %}
{% endblock %}
