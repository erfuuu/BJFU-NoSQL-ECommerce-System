{% extends 'business_base.html' %}

{% block title %}删除商品{% endblock %}

{% block content %}
<style>
    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
        margin: 0 auto;
        max-width: 1200px;
    }
    .product {
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        background-color: #fff;
        text-align: center;
        padding: 15px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .product:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }
    .product img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-bottom: 1px solid #ddd;
        margin-bottom: 15px;
    }
    .product h3 {
        font-size: 18px;
        color: #333;
        margin: 10px 0;
    }
    .product p {
        font-size: 14px;
        color: #666;
        margin: 5px 0;
    }
    .product form {
        margin-top: 10px;
    }
    .product button {
        background-color: #e74c3c;
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.2s ease;
    }
    .product button:hover {
        background-color: #c0392b;
    }
</style>

<div class="product-grid">
    {% for product in products %}
    <div class="product">
        <img src="{{ product.image_url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>简介: {{ product.description }}</p>
        <p>价格: ¥{{ product.price }}</p>
        <p>销量: {{ product.sales_volume }}</p>
        <form action="{% url 'delete_single_product' product.product_id %}" method="post">
            {% csrf_token %}
            <button type="submit">确认下架</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
